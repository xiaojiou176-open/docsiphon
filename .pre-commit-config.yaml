repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
      - id: check-yaml
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.28.0
    hooks:
      - id: gitleaks
        args:
          - --redact

  - repo: local
    hooks:
      - id: repo-contracts
        name: repo contracts
        entry: uv run python scripts/check_contracts.py
        language: system
        pass_filenames: false
      - id: repo-hygiene
        name: repo hygiene
        entry: uv run python scripts/check_repo_hygiene.py
        language: system
        pass_filenames: false
