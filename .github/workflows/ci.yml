name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Check governance contracts
        run: python scripts/check_contracts.py

      - name: Check repository hygiene
        run: python scripts/check_repo_hygiene.py

      - name: Sync environment
        run: uv sync --frozen

      - name: Run pre-commit policy
        run: uv run pre-commit run --all-files

      - name: Run tests
        run: uv run pytest tests

      - name: Verify CLI entrypoint
        run: uv run docsiphon --help
