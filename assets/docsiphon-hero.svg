<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">Docsiphon hero</title>
  <desc id="desc">A product-style hero image showing a scoped docs export, preserved Markdown tree, and audit artifacts.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="55%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="26" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1600" height="980" fill="url(#bg)"/>
  <circle cx="1320" cy="170" r="230" fill="#38bdf8" fill-opacity="0.12"/>
  <circle cx="1380" cy="820" r="320" fill="#f59e0b" fill-opacity="0.10"/>
  <circle cx="180" cy="820" r="250" fill="#22c55e" fill-opacity="0.10"/>

  <g filter="url(#shadow)">
    <rect x="80" y="90" width="670" height="800" rx="34" fill="url(#panel)" stroke="#334155" stroke-width="2"/>
    <rect x="850" y="150" width="670" height="680" rx="34" fill="url(#panel)" stroke="#334155" stroke-width="2"/>
  </g>

  <text x="120" y="165" fill="#f8fafc" font-size="48" font-family="SF Pro Display, Inter, Arial, sans-serif" font-weight="700">Turn docsites into local AI-ready corpora</text>
  <text x="120" y="215" fill="#cbd5e1" font-size="25" font-family="SF Pro Text, Inter, Arial, sans-serif">Scoped export, preserved paths, Markdown-first fetch, and audit artifacts in one CLI.</text>

  <rect x="120" y="260" width="265" height="44" rx="22" fill="#0f172a" stroke="#155e75"/>
  <text x="145" y="289" fill="#67e8f9" font-size="20" font-family="SF Mono, Menlo, monospace">LLM-ready Markdown corpus</text>
  <rect x="400" y="260" width="190" height="44" rx="22" fill="#0f172a" stroke="#92400e"/>
  <text x="425" y="289" fill="#fbbf24" font-size="20" font-family="SF Mono, Menlo, monospace">run_id 06f0f84e0332</text>

  <text x="120" y="350" fill="#94a3b8" font-size="19" font-family="SF Mono, Menlo, monospace">$ uvx --from git+https://github.com/xiaojiou176-open/docsiphon.git \</text>
  <text x="120" y="380" fill="#e2e8f0" font-size="24" font-family="SF Mono, Menlo, monospace">  docsiphon "https://developerdocs.instructure.com/services/canvas" \</text>
  <text x="120" y="410" fill="#e2e8f0" font-size="24" font-family="SF Mono, Menlo, monospace">  --scope-prefix /services/canvas --max-pages 6 --out ./_outputs</text>

  <rect x="120" y="460" width="590" height="360" rx="26" fill="#020617" stroke="#1e293b"/>
  <rect x="120" y="460" width="590" height="12" rx="6" fill="url(#accent)"/>
  <text x="150" y="515" fill="#f8fafc" font-size="30" font-family="SF Pro Display, Inter, Arial, sans-serif" font-weight="700">Resulting tree</text>
  <text x="150" y="560" fill="#38bdf8" font-size="22" font-family="SF Mono, Menlo, monospace">_outputs/</text>
  <text x="175" y="594" fill="#e2e8f0" font-size="22" font-family="SF Mono, Menlo, monospace">└── canvas/</text>
  <text x="210" y="628" fill="#e2e8f0" font-size="22" font-family="SF Mono, Menlo, monospace">├── basics.md</text>
  <text x="210" y="662" fill="#e2e8f0" font-size="22" font-family="SF Mono, Menlo, monospace">├── basics/</text>
  <text x="245" y="696" fill="#e2e8f0" font-size="22" font-family="SF Mono, Menlo, monospace">├── file.changelog.md</text>
  <text x="245" y="730" fill="#e2e8f0" font-size="22" font-family="SF Mono, Menlo, monospace">├── file.compound_documents.md</text>
  <text x="245" y="764" fill="#e2e8f0" font-size="22" font-family="SF Mono, Menlo, monospace">└── file.endpoint_attributes.md</text>
  <text x="210" y="798" fill="#e2e8f0" font-size="22" font-family="SF Mono, Menlo, monospace">├── manifest.jsonl</text>
  <text x="210" y="832" fill="#e2e8f0" font-size="22" font-family="SF Mono, Menlo, monospace">├── report.json / report.html / toc.md</text>

  <text x="890" y="220" fill="#f8fafc" font-size="36" font-family="SF Pro Display, Inter, Arial, sans-serif" font-weight="700">Audit artifacts that explain the run</text>
  <text x="890" y="260" fill="#cbd5e1" font-size="22" font-family="SF Pro Text, Inter, Arial, sans-serif">Real sample export against the Canvas developer docs, scoped to 6 pages.</text>

  <g>
    <rect x="890" y="320" width="290" height="136" rx="24" fill="#020617" stroke="#155e75"/>
    <text x="920" y="367" fill="#67e8f9" font-size="23" font-family="SF Pro Display, Inter, Arial, sans-serif" font-weight="700">report.json</text>
    <text x="920" y="407" fill="#e2e8f0" font-size="20" font-family="SF Mono, Menlo, monospace">total: 334</text>
    <text x="920" y="436" fill="#e2e8f0" font-size="20" font-family="SF Mono, Menlo, monospace">scheduled: 6</text>
    <text x="920" y="465" fill="#e2e8f0" font-size="20" font-family="SF Mono, Menlo, monospace">failed: 0</text>
  </g>

  <g>
    <rect x="1200" y="320" width="290" height="136" rx="24" fill="#020617" stroke="#166534"/>
    <text x="1230" y="367" fill="#86efac" font-size="23" font-family="SF Pro Display, Inter, Arial, sans-serif" font-weight="700">manifest.jsonl</text>
    <text x="1230" y="407" fill="#e2e8f0" font-size="20" font-family="SF Mono, Menlo, monospace">page-level ledger</text>
    <text x="1230" y="436" fill="#e2e8f0" font-size="20" font-family="SF Mono, Menlo, monospace">source, status, hash</text>
    <text x="1230" y="465" fill="#e2e8f0" font-size="20" font-family="SF Mono, Menlo, monospace">run_id, extractor</text>
  </g>

  <g>
    <rect x="890" y="492" width="290" height="136" rx="24" fill="#020617" stroke="#92400e"/>
    <text x="920" y="539" fill="#fbbf24" font-size="23" font-family="SF Pro Display, Inter, Arial, sans-serif" font-weight="700">toc.md</text>
    <text x="920" y="579" fill="#e2e8f0" font-size="20" font-family="SF Mono, Menlo, monospace">human-readable tree</text>
    <text x="920" y="608" fill="#e2e8f0" font-size="20" font-family="SF Mono, Menlo, monospace">mirrors path structure</text>
  </g>

  <g>
    <rect x="1200" y="492" width="290" height="136" rx="24" fill="#020617" stroke="#7c3aed"/>
    <text x="1230" y="539" fill="#c4b5fd" font-size="23" font-family="SF Pro Display, Inter, Arial, sans-serif" font-weight="700">report.html</text>
    <text x="1230" y="579" fill="#e2e8f0" font-size="20" font-family="SF Mono, Menlo, monospace">review summary</text>
    <text x="1230" y="608" fill="#e2e8f0" font-size="20" font-family="SF Mono, Menlo, monospace">good for handoff</text>
  </g>

  <g>
    <rect x="890" y="678" width="600" height="96" rx="28" fill="#0b1220" stroke="#334155"/>
    <text x="930" y="735" fill="#f8fafc" font-size="26" font-family="SF Pro Display, Inter, Arial, sans-serif" font-weight="700">Designed for AI ingestion, review, and repeatable exports</text>
  </g>
</svg>
